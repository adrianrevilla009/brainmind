version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: brainmind_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: brainmind
      POSTGRES_USER: brainmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brainmind_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brainmind_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: brainmind_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: brainmind_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU NVIDIA (descomenta si dispones de ella):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: brainmind_ollama_init
    restart: "no"
    # Sin profiles: se ejecuta siempre con docker compose up
    # restart: no garantiza que solo corra una vez por arranque
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'Comprobando modelos Ollama...' &&
        OLLAMA_HOST=http://ollama:11434 ollama list | grep -q 'mistral:7b' || OLLAMA_HOST=http://ollama:11434 ollama pull mistral:7b &&
        OLLAMA_HOST=http://ollama:11434 ollama list | grep -q 'nomic-embed-text' || OLLAMA_HOST=http://ollama:11434 ollama pull nomic-embed-text &&
        echo 'Modelos OK'
      "
    volumes:
      - ollama_data:/root/.ollama

  # ── Jitsi Meet — videollamada self-hosted, gratuita ──────────────────────────
  jitsi:
    image: jitsi/web:stable-9111
    container_name: brainmind_jitsi
    restart: unless-stopped
    ports:
      - "8443:80"
    volumes:
      - jitsi_web_config:/config
      - jitsi_web_transcripts:/usr/share/jitsi-meet/transcripts
    environment:
      - PUBLIC_URL=http://localhost:8443
      - ENABLE_GUESTS=1
      - ENABLE_AUTH=0
      - DISABLE_HTTPS=1
      - JICOFO_AUTH_USER=focus
      - XMPP_SERVER=prosody
      - XMPP_BOSH_URL_BASE=http://prosody:5280
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - TZ=Europe/Madrid
    depends_on:
      - prosody
    networks:
      - meet.jitsi
      - default

  prosody:
    image: jitsi/prosody:stable-9111
    container_name: brainmind_prosody
    restart: unless-stopped
    expose:
      - "5222"
      - "5280"
      - "5347"
    volumes:
      - jitsi_prosody_config:/config
      - jitsi_prosody_plugins:/prosody-plugins-custom
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=0
      - ENABLE_GUESTS=1
      - GLOBAL_MODULES=statistics,alert
      - GLOBAL_CONFIG=statistics_interval=30
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_MODULES=
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo_dev_password}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb_dev_password}
      - TZ=Europe/Madrid
    networks:
      meet.jitsi:
        aliases:
          - meet.jitsi
          - auth.meet.jitsi
          - guest.meet.jitsi
          - muc.meet.jitsi
          - internal-muc.meet.jitsi

  jicofo:
    image: jitsi/jicofo:stable-9111
    container_name: brainmind_jicofo
    restart: unless-stopped
    volumes:
      - jitsi_jicofo_config:/config
    environment:
      - AUTH_TYPE=internal
      - ENABLE_AUTH=0
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - JICOFO_AUTH_USER=focus
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD:-jicofo_dev_password}
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb_dev_password}
      - TZ=Europe/Madrid
    depends_on:
      - prosody
    networks:
      - meet.jitsi

  jvb:
    image: jitsi/jvb:stable-9111
    container_name: brainmind_jvb
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
      - "4443:4443"
    volumes:
      - jitsi_jvb_config:/config
    environment:
      - DOCKER_HOST_ADDRESS=${DOCKER_HOST_ADDRESS:-127.0.0.1}
      - XMPP_SERVER=prosody
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - JVB_AUTH_USER=jvb
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD:-jvb_dev_password}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_STUN_SERVERS=meet-jit-si-turnrelay.jitsi.net:443
      - TZ=Europe/Madrid
    depends_on:
      - prosody
    networks:
      - meet.jitsi

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainmind_api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: postgresql://brainmind:${POSTGRES_PASSWORD:-brainmind_dev_password}@postgres:5432/brainmind
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_change_in_production_min_32_chars}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-mistral:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      WHISPER_MODE: ${WHISPER_MODE:-mock}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-medium}
      QDRANT_URL: http://qdrant:6333
      JITSI_BASE_URL: ${JITSI_BASE_URL:-http://localhost:8443}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OTEL_ENDPOINT: http://otel-collector:4317
      ENVIRONMENT: ${ENVIRONMENT:-development}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brainmind_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_JITSI_BASE_URL: ${JITSI_BASE_URL:-http://localhost:8443}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILIDAD — Prometheus · Loki · Tempo · Grafana · OTel Collector
  # Acceso Grafana: http://localhost:3001  (admin / brainmind)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── OpenTelemetry Collector — recibe trazas del backend ──────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: brainmind_otel
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-config.yml"]
    volumes:
      - ./observability/otel-collector/otel-config.yml:/etc/otel/otel-config.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Métricas Prometheus derivadas de trazas
    depends_on:
      - tempo

  # ── Prometheus — scraping y almacenamiento de métricas ────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: brainmind_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-remote-write-receiver
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ── Loki — agregación de logs ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: brainmind_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    user: "0"   # root para evitar permission denied en el volumen
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  # ── Promtail — agente que envía logs de contenedores a Loki ──────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: brainmind_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  # ── Tempo — almacenamiento de trazas distribuidas ─────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: brainmind_tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (Grafana datasource)
      - "4316:4317"   # OTLP gRPC interno (no exponer al host)

  # ── PostgreSQL Exporter — métricas de la BD para Prometheus ──────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: brainmind_pg_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://brainmind:${POSTGRES_PASSWORD:-brainmind_dev_password}@postgres:5432/brainmind?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Redis Exporter — métricas de Redis para Prometheus ───────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: brainmind_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  # ── Grafana — dashboards visuales ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: brainmind_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: brainmind
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor traceToMetrics
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  uploads_data:
  jitsi_web_config:
  jitsi_web_transcripts:
  jitsi_prosody_config:
  jitsi_prosody_plugins:
  jitsi_jicofo_config:
  jitsi_jvb_config:
  # Observabilidad
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  meet.jitsi:
  default:
    name: brainmind_default