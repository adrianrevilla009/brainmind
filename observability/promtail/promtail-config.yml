server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ── Logs de todos los contenedores Docker ────────────────────────────────────
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
    pipeline_stages:
      # Detectar logs JSON del backend y parsearlos
      - match:
          selector: '{service="backend"}'
          stages:
            - json:
                expressions:
                  level: level
                  logger: logger
                  request_id: request_id
                  status_code: status_code
                  duration_ms: duration_ms
            - labels:
                level:
                logger:
            - metrics:
                log_lines_total:
                  type: Counter
                  description: Total log lines by level
                  prefix: brainmind_
                  source: level
                  config:
                    action: inc
      # Marcar errores del frontend
      - match:
          selector: '{service="backend"} |= "FRONTEND"'
          stages:
            - labels:
                source: frontend
