receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 256
  resource:
    attributes:
      - key: service.name
        value: brainmind-api
        action: upsert
      - key: deployment.environment
        from_attribute: ENVIRONMENT
        action: insert

exporters:
  # Trazas → Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Métricas derivadas de trazas → Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: otel

  # Debug en development
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
